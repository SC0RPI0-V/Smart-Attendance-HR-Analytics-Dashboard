{% extends "layouts/auth_base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card p-4 shadow" style="width:450px;">

        <div class="text-center mb-4">

            <i class="fa-solid fa-user-plus fa-3x text-primary"></i>

            <h2 class="mt-3">Create Account</h2>

            <p class="text-muted">
                HR Insight Administration
            </p>

        </div>

        <form method="POST">

            <div class="mb-3">
                <label>Username</label>
                <input
                    type="text"
                    class="form-control"
                    name="username"
                    required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input
                    type="email"
                    class="form-control"
                    name="email"
                    required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input
                    type="password"
                    class="form-control"
                    name="password"
                    required>
            </div>

            <button class="btn btn-success w-100">
                Register
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="{{ url_for('auth.login') }}">
                Already have an account?
            </a>

        </div>

    </div>

</div>

{% endblock %}
