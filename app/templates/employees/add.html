{% extends "layouts/base.html" %}

{% block title %}
Add Employee
{% endblock %}

{% block content %}

<div class="container">

    <h2 class="mb-4">Add Employee</h2>

    <form method="POST">

        <input
            type="text"
            name="employee_code"
            placeholder="Employee Code"
            class="form-control mb-3"
            required>

        <input
            type="text"
            name="first_name"
            placeholder="First Name"
            class="form-control mb-3"
            required>

        <input
            type="text"
            name="last_name"
            placeholder="Last Name"
            class="form-control mb-3"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email"
            class="form-control mb-3"
            required>

        <input
            type="text"
            name="phone"
            placeholder="Phone"
            class="form-control mb-3">

        <select
            name="gender"
            class="form-select mb-3">

            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>

        </select>

        <input
            type="text"
            name="designation"
            placeholder="Designation"
            class="form-control mb-3"
            required>

        <input
            type="date"
            name="joining_date"
            class="form-control mb-3"
            required>

        <input
            type="number"
            step="0.01"
            name="salary"
            placeholder="Salary"
            class="form-control mb-3">

        <select
            name="department_id"
            class="form-select mb-3"
            required>

            <option value="">Select Department</option>

            {% for dept in departments %}

            <option value="{{ dept.id }}">
                {{ dept.department_name }}
            </option>

            {% endfor %}

        </select>

        <button type="submit" class="btn btn-success">
            Save Employee
        </button>

        <a href="{{ url_for('employees.index') }}" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

{% endblock %}
