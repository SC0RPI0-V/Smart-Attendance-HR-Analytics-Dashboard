```html
{% extends "layouts/base.html" %}

{% block title %}
Edit Employee
{% endblock %}

{% block content %}

<div class="container">

    <h2 class="mb-4">Edit Employee</h2>

    <form method="POST">

        <input
            type="text"
            name="employee_code"
            class="form-control mb-3"
            value="{{ employee.employee_code }}"
            required>

        <input
            type="text"
            name="first_name"
            class="form-control mb-3"
            value="{{ employee.first_name }}"
            required>

        <input
            type="text"
            name="last_name"
            class="form-control mb-3"
            value="{{ employee.last_name }}"
            required>

        <input
            type="email"
            name="email"
            class="form-control mb-3"
            value="{{ employee.email }}"
            required>

        <input
            type="text"
            name="phone"
            class="form-control mb-3"
            value="{{ employee.phone }}">

        <select
            name="gender"
            class="form-select mb-3">

            <option value="Male"
            {% if employee.gender=="Male" %}selected{% endif %}>
                Male
            </option>

            <option value="Female"
            {% if employee.gender=="Female" %}selected{% endif %}>
                Female
            </option>

            <option value="Other"
            {% if employee.gender=="Other" %}selected{% endif %}>
                Other
            </option>

        </select>

        <input
            type="text"
            name="designation"
            class="form-control mb-3"
            value="{{ employee.designation }}"
            required>

        <input
            type="date"
            name="joining_date"
            class="form-control mb-3"
            value="{{ employee.joining_date }}"
            required>

        <input
            type="number"
            step="0.01"
            name="salary"
            class="form-control mb-3"
            value="{{ employee.salary }}">

        <select
            name="department_id"
            class="form-select mb-3">

            {% for dept in departments %}

            <option
                value="{{ dept.id }}"
                {% if dept.id==employee.department_id %}selected{% endif %}>

                {{ dept.department_name }}

            </option>

            {% endfor %}

        </select>

        <button class="btn btn-primary">
            Update Employee
        </button>

        <a href="{{ url_for('employees.index') }}"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
```
